<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}塔外智能 TowerOS{% endblock %}</title>
  <link rel="stylesheet" href="{{ request.url_for('static', path='css/styles.css') }}">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23145cff'/%3E%3Cpath d='M17 17h30v8H36v22h-8V25H17z' fill='white'/%3E%3C/svg%3E">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/"><span class="brand-mark">T</span><span><strong>塔外智能</strong><small>TowerAI</small></span></a>
    <nav class="nav">
      <a class="{% if active == 'home' %}active{% endif %}" href="/">首页</a>
      <a class="{% if active == 'product' %}active{% endif %}" href="/product">平台能力</a>
      <a class="{% if active == 'scenarios' %}active{% endif %}" href="/scenarios">解决方案</a>
      <a class="{% if active == 'agent' %}active{% endif %}" href="/agent">智能咨询</a>
      <a class="{% if active == 'about' %}active{% endif %}" href="/about">关于塔外</a>
    </nav>
    <a class="header-cta" href="/agent">获取方案</a>
  </header>
  <main>{% block content %}{% endblock %}</main>
  <footer class="footer">
    <div class="shell footer-grid">
      <div><strong>塔外智能</strong><p>TowerOS 企业智能体应用平台</p></div>
      <div><span>平台能力</span><a href="/product">岗位任务智能体</a><a href="/product">企业知识智能体</a><a href="/product">业务流程智能体</a></div>
      <div><span>解决方案</span><a href="/scenarios">工业安全</a><a href="/scenarios">运营复盘</a><a href="/scenarios">文档处理</a></div>
      <div><span>联系入口</span><a href="/agent">智能咨询</a><a href="/about">关于塔外</a></div>
    </div>
  </footer>
  {% block scripts %}{% endblock %}
</body>
</html>
